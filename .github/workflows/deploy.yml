name: Deploy LLM Price Arena

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.PORT || '22' }}
          script: |
            set -e
            APP_DIR=/opt/llm-price-arena
            IMAGE=ghcr.io/bifidotich/llm-price-arena:latest

            echo "[1/5] Cleaning up disk space on VPS..."
            docker system prune -af --volumes || true

            echo "[2/5] Authenticating with GHCR (direct config.json)..."
            mkdir -p ~/.docker
            echo "{\"auths\":{\"ghcr.io\":{\"auth\":\"$(echo -n "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" | base64 -w0)\"}}}}" > ~/.docker/config.json
            docker pull $IMAGE

            echo "[3/5] Ensuring app directory and clearing old cache (forces fresh data fetch)..."
            mkdir -p $APP_DIR/data
            rm -f $APP_DIR/data/*.json $APP_DIR/data/*.pickle 2>/dev/null || true
            ufw allow 8000/tcp 2>/dev/null || true
            ufw reload 2>/dev/null || true

            echo "[4/5] Stopping old container..."
            docker stop llm-price-arena 2>/dev/null || true
            docker rm llm-price-arena 2>/dev/null || true

            echo "[5/5] Running new container..."
            touch $APP_DIR/.env 2>/dev/null || true
            docker run -d \
              --name llm-price-arena \
              --restart unless-stopped \
              -p 8000:8000 \
              --env-file $APP_DIR/.env \
              -v $APP_DIR/data:/app/data \
              $IMAGE

            echo "[6/6] Waiting for app to start (up to 90s)..."
            for i in $(seq 1 30); do
              sleep 3
              STATUS=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8000/api/health 2>/dev/null || echo "000")
              if [ "$STATUS" = "200" ]; then
                echo "  ✅ App is healthy!"
                echo "✅ Deploy complete"
                exit 0
              fi
              echo "  Attempt $i/30 — HTTP $STATUS"
            done
            echo "  ❌ Health check failed. Container logs:"
            $COMPOSE_CMD logs --tail=50 2>/dev/null || true
            echo "  ❌ Container status:"
            docker ps -a 2>/dev/null || true
            exit 1

