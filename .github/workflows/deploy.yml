name: Deploy LLM Price Arena

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.PORT || '22' }}
          script: |
            set -e
            APP_DIR=/opt/llm-price-arena
            IMAGE=ghcr.io/bifidotich/llm-price-arena:latest

            echo "[1/4] Pulling latest image..."
            docker pull $IMAGE

            echo "[2/4] Ensuring app directory..."
            mkdir -p $APP_DIR/data

            echo "[3/4] Deploying container..."
            cd $APP_DIR
            echo "services:" > docker-compose.yml
            echo "  app:" >> docker-compose.yml
            echo "    image: $IMAGE" >> docker-compose.yml
            echo '    ports:' >> docker-compose.yml
            echo '      - "${SERVER__PORT:-8000}:8000"' >> docker-compose.yml
            echo '    env_file:' >> docker-compose.yml
            echo '      - .env' >> docker-compose.yml
            echo '    volumes:' >> docker-compose.yml
            echo '      - ./data:/app/data' >> docker-compose.yml
            echo '    restart: unless-stopped' >> docker-compose.yml
            docker compose up -d --pull always

            echo "[4/4] Health check..."
            for i in $(seq 1 15); do
              sleep 2
              STATUS=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8000/api/health 2>/dev/null || echo "000")
              if [ "$STATUS" = "200" ]; then
                echo "  ✅ App is healthy!"
                break
              fi
              echo "  Attempt $i/15 — HTTP $STATUS"
            done
            echo "✅ Deploy complete"
