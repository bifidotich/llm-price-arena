name: Deploy LLM Price Arena

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.PORT || '22' }}
          script: |
            set -e
            APP_DIR=/opt/llm-price-arena
            IMAGE=ghcr.io/bifidotich/llm-price-arena:latest

            echo "[1/5] Cleaning up disk space on VPS..."
            docker system prune -af --volumes || true

            echo "[2/5] Authenticating with GHCR (direct config.json)..."
            mkdir -p ~/.docker
            echo "{\"auths\":{\"ghcr.io\":{\"auth\":\"$(echo -n "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" | base64 -w0)\"}}}}" > ~/.docker/config.json
            docker pull $IMAGE

            echo "[3/5] Ensuring app directory..."
            mkdir -p $APP_DIR/data

            echo "[4/5] Installing Docker Compose plugin (if missing)..."
            docker compose version >/dev/null 2>&1 || { apt-get update -qq && apt-get install -y -qq docker-compose-plugin 2>/dev/null || apt-get install -y -qq docker-compose 2>/dev/null || { echo "  Manual install of Docker Compose plugin..." && mkdir -p /usr/lib/docker/cli-plugins && curl -sL "https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m)" -o /usr/lib/docker/cli-plugins/docker-compose && chmod +x /usr/lib/docker/cli-plugins/docker-compose; }; }

            echo "[5/5] Deploying container..."
            cd $APP_DIR
            echo "services:" > docker-compose.yml
            echo "  app:" >> docker-compose.yml
            echo "    image: $IMAGE" >> docker-compose.yml
            echo '    ports:' >> docker-compose.yml
            echo '      - "${SERVER__PORT:-8000}:8000"' >> docker-compose.yml
            echo '    env_file:' >> docker-compose.yml
            echo '      - .env' >> docker-compose.yml
            echo '    volumes:' >> docker-compose.yml
            echo '      - ./data:/app/data' >> docker-compose.yml
            echo '    restart: unless-stopped' >> docker-compose.yml
            docker compose up -d --pull always

            echo "[6/6] Waiting for app to start (up to 90s)..."
            for i in $(seq 1 30); do
              sleep 3
              STATUS=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8000/api/health 2>/dev/null || echo "000")
              if [ "$STATUS" = "200" ]; then
                echo "  ✅ App is healthy!"
                echo "✅ Deploy complete"
                exit 0
              fi
              echo "  Attempt $i/30 — HTTP $STATUS"
            done
            echo "  ❌ Health check failed. Container logs:"
            docker compose logs --tail=50 2>/dev/null || true
            echo "  ❌ Container status:"
            docker ps -a 2>/dev/null || true
            exit 1

