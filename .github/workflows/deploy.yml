name: Deploy LLM Price Arena

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.PORT || '22' }}
          script: |
            set -e
            APP_DIR=/opt/llm-price-arena
            IMAGE=ghcr.io/bifidotich/llm-price-arena:latest

            echo "[1/5] Cleaning up disk space on VPS..."
            docker system prune -af --volumes || true

            echo "[2/5] Authenticating with GHCR (direct config.json)..."
            mkdir -p ~/.docker
            echo "{\"auths\":{\"ghcr.io\":{\"auth\":\"$(echo -n "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" | base64 -w0)\"}}}}" > ~/.docker/config.json
            docker pull $IMAGE

            echo "[3/5] Ensuring app directory and opening firewall port 8000..."
            mkdir -p $APP_DIR/data
            ufw allow 8000/tcp 2>/dev/null || true
            ufw reload 2>/dev/null || true

            echo "[4/5] Installing Docker Compose (if missing)..."
            if docker compose version >/dev/null 2>&1; then
              COMPOSE_CMD="docker compose"
              COMPOSE_PULL="--pull always"
            elif command -v docker-compose >/dev/null 2>&1; then
              COMPOSE_CMD="docker-compose"
              COMPOSE_PULL=""
            else
              echo "  Installing Docker Compose plugin to ~/.docker/cli-plugins..."
              mkdir -p ~/.docker/cli-plugins
              curl -sL "https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m)" -o ~/.docker/cli-plugins/docker-compose
              chmod +x ~/.docker/cli-plugins/docker-compose
              # Also try docker-compose v1 binary
              curl -sL "https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose 2>/dev/null || true
              chmod +x /usr/local/bin/docker-compose 2>/dev/null || true
              if docker compose version >/dev/null 2>&1; then
                COMPOSE_CMD="docker compose"
              else
                COMPOSE_CMD="docker-compose"
              fi
            fi
            echo "  Using: $COMPOSE_CMD"

            echo "[5/5] Deploying container..."
            cd $APP_DIR
            echo "version: '3'" > docker-compose.yml
            echo "services:" >> docker-compose.yml
            echo "  app:" >> docker-compose.yml
            echo "    image: $IMAGE" >> docker-compose.yml
            echo '    ports:' >> docker-compose.yml
            echo '      - "8000:8000"' >> docker-compose.yml
            echo '    env_file:' >> docker-compose.yml
            echo '      - .env' >> docker-compose.yml || true
            echo '    volumes:' >> docker-compose.yml
            echo '      - ./data:/app/data' >> docker-compose.yml
            echo '    restart: unless-stopped' >> docker-compose.yml
            $COMPOSE_CMD up -d $COMPOSE_PULL

            echo "[6/6] Waiting for app to start (up to 90s)..."
            for i in $(seq 1 30); do
              sleep 3
              STATUS=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8000/api/health 2>/dev/null || echo "000")
              if [ "$STATUS" = "200" ]; then
                echo "  ✅ App is healthy!"
                echo "✅ Deploy complete"
                exit 0
              fi
              echo "  Attempt $i/30 — HTTP $STATUS"
            done
            echo "  ❌ Health check failed. Container logs:"
            $COMPOSE_CMD logs --tail=50 2>/dev/null || true
            echo "  ❌ Container status:"
            docker ps -a 2>/dev/null || true
            exit 1

