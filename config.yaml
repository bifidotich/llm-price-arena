# LLM Value Tracker — конфигурация.
# Любое значение можно переопределить переменной окружения (см. app/config.py).

server:
  host: 0.0.0.0
  port: 8000

worker:
  # Интервал обновления данных в минутах.
  refresh_interval_minutes: 360
  # Прогревать кэш при старте, если он пуст.
  warm_on_start: true

cache:
  backend: file            # file | (redis — TODO)
  path: data/snapshot.json

scoring:
  anchor: 1400             # якорь Elo для winProb
  token_share: 0.75        # доля входных токенов в blended_price (≈ 3:1 вход:выход)
  presets:
    quality:  { beta: 2.0, gamma: 0.3 }
    balanced: { beta: 1.0, gamma: 0.5 }   # дефолт
    budget:   { beta: 1.0, gamma: 1.0 }
  default_preset: balanced

sources:
  lmarena:
    dataset: lmarena-ai/leaderboard-dataset
    split: latest
    # Маппинг UI-вкладки → (subset датасета, значение поля category).
    # ВНИМАНИЕ: точные имена subset'ов/категорий нужно сверить с датасетом
    # (см. app/sources/lmarena.py — там TODO про инспекцию схемы).
    categories:
      overall:  { subset: text, category: overall }
      coding:   { subset: text, category: coding }
      math:     { subset: text, category: coding }                    # временно — math как coding
      research: { subset: text, category: expert }
      agent:    { subset: text, category: hard_prompts }              # временно — agent как hard
  openrouter:
    url: https://openrouter.ai/api/v1/models

# Маппинг имён LMArena -> id модели в OpenRouter.
# Ключ — model_name из датасета, значение — id в OpenRouter (pricing берётся оттуда).
# Это самое хрупкое место: имена не совпадают, часть моделей на OpenRouter нет.
model_aliases:
  claude-fable-5:                anthropic/claude-fable-5
  claude-opus-4-5-20251101:     anthropic/claude-opus-4.5
  claude-opus-4-6:              anthropic/claude-opus-4.6
  claude-opus-4-6-thinking:     anthropic/claude-opus-4.6
  claude-opus-4-7:              anthropic/claude-opus-4.7
  claude-opus-4-7-thinking:     anthropic/claude-opus-4.7
  claude-opus-4-8:              anthropic/claude-opus-4.8
  claude-opus-4-8-thinking:     anthropic/claude-opus-4.8
  claude-sonnet-4-6:            anthropic/claude-sonnet-4.6
  deepseek-v4-pro:              deepseek/deepseek-v4-pro
  deepseek-v4-pro-thinking:     deepseek/deepseek-v4-pro
  gemini-2.5-pro:               google/gemini-2.5-pro
  gemini-3-flash:               google/gemini-3-flash
  gemini-3-pro:                 google/gemini-3-pro
  gemini-3.1-pro-preview:       google/gemini-3.1-pro-preview
  gemini-3.5-flash:             google/gemini-3.5-flash
  glm-4.7:                      zhipu-ai/glm-4.7
  glm-5:                        zhipu-ai/glm-5
  glm-5.1:                      zhipu-ai/glm-5.1
  "glm-5.2 (max)":             "zhipu-ai/glm-5.2-max"
  gpt-5.4:                      openai/gpt-5.4
  gpt-5.5:                      openai/gpt-5.5
  grok-4.20-beta-0309-reasoning: xai/grok-4.20-beta-0309-reasoning
  grok-4.20-multi-agent-beta-0309: xai/grok-4.20-multi-agent-beta-0309
  kimi-k2.5-thinking:           moonshot/kimi-k2.5-thinking
  kimi-k2.6:                    moonshot/kimi-k2.6
  mimo-v2.5:                    minimax/mimo-v2.5
  mimo-v2.5-pro:                minimax/mimo-v2.5-pro
  minimax-m3:                   minimax/minimax-m3
  mistral-medium-3.5:           mistralai/mistral-medium-3.5
  qwen3-next-80b-a3b-instruct:  qwen/qwen3-next-80b-a3b-instruct
  qwen3.5-397b-a17b:            qwen/qwen3.5-397b-a17b
  qwen3.6-max-preview:          qwen/qwen3.6-max-preview
  qwen3.6-plus:                 qwen/qwen3.6-plus
  qwen3.7-max-preview:          qwen/qwen3.7-max-preview